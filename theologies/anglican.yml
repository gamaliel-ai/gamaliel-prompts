name: Anglican (Communion)

description: The theological perspective of the Anglican Communion (churches in communion with the Archbishop of Canterbury), emphasizing the via media (middle way) between Catholic and Reformed traditions, the authority of Scripture, reason, and tradition, and the importance of liturgy and sacraments.

